---
- name: Configurar Servidores Web con Tienda Online
  hosts: servidores_web
  become: yes

  tasks:
    - name: 1. Instalar Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: 2. Encender Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: 3. Copiar la Tienda Online a los servidores
      copy:
        src: index.html
        dest: /var/www/html/index.html